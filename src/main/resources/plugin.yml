name: ResourcesWorldResetter
version: '4.0.0'
main: com.lozaine.ResourceWorldResetter.ResourceWorldResetter
api-version: '1.26'
softdepend: [Multiverse-Core]
author: Lozaine
description: A plugin to reset the resources world at regular intervals.

commands:
  rwr:
    description: "ResourceWorldResetter command root"
    usage: "/rwr <gui|reload|reset now|resume [cancel]|tp|back|region <enable|disable|list|add|remove|addhere>|status|next>"
    permission: "resourceworldresetter.admin"
    # Deprecated standalone aliases removed. Use `/rwr` with subcommands instead.