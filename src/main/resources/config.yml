# Config schema version - do not edit
configVersion: 4

# World name to reset. Leave empty on first install — use /rwr gui in-game to select an existing world
worldName: ""

# Reset schedule configuration
schedule:
  # Reset frequency: "daily", "weekly", or "monthly"
  mode: "daily"
  
  # Time of day when reset happens
  time:
    hour: 3                    # Hour of day (0-23 24-hour format)
  
  # Minutes to warn players before reset
  warningMinutes: 5
  
  # Day setting (used for weekly/monthly modes):
  # - For weekly: day of week (1=Monday through 7=Sunday)
  # - For monthly: day of month (1-31)
  day: 1

# Region-based reset options
regions:
  enabled: false               # If true, resets target only configured regions instead of whole world
  immediateRegenerationOnAdd: true  # If true, a region regenerates immediately when added via command
  list: []                     # List of region coordinates to regenerate, format: "x,z" (region coords)